<!DOCTYPE html>
<html lang="en">
    <!--No verification needed to reset a password-->
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Password Recorder</title>
        <style>
            body {
                background-color: lightcoral;
                color: black;
                font-family: Arial, sans-serif;
            }
            .recorder-box {
                background-color: rgb(240, 128, 128);
                width: 300px;
                padding: 20px;
                margin: auto;
                margin-top: 100px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .recorder-text {
                text-align: center;
                font-size: 24px;
                margin-bottom: 20px;
            }
            input[type="text"], input[type="password"] {
                width: 93%;
                padding: 10px;
                margin: 5px 0 15px 0;
                border: none;
                border-radius: 5px;
            }
            input[type="submit"] {
                width: 100%;
                padding: 10px;
                background-color: darkred;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
            input[type="submit"]:hover {
                background-color: maroon;
            }
        </style>
    </head>
    <body>
        <div class="recorder-box">
            <div class="recorder-text">Reset Password</div>
            <form action="/reset_password" method="post">
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="new_password" placeholder="New Password" required><br>
                <input type="submit" value="Reset Password">
            </form>
        </div>
    </body>
    
    <script>
        // No verification script needed
    </script>
</html>
