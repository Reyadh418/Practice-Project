<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tasnim Maria — Word Portrait</title>
<style>
  :root{
    --bg:#070812;
    --panel: rgba(255,255,255,.08);
    --line: rgba(255,255,255,.10);
    --text: rgba(255,255,255,.88);
    --muted: rgba(255,255,255,.62);
  }

  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    background: radial-gradient(1000px 800px at 50% 18%, #1a1f48 0%, var(--bg) 55%, #05050a 100%);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:var(--text);
  }

  .wrap{
    width:min(95vw, 820px);
    display:grid;
    gap:12px;
  }

  .frame{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:22px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.10);
    box-shadow: 0 30px 100px rgba(0,0,0,.60);
    background:
      radial-gradient(240px 200px at 30% 28%, rgba(255,255,255,.06), transparent 72%),
      radial-gradient(280px 240px at 72% 35%, rgba(255,255,255,.05), transparent 74%),
      linear-gradient(180deg, rgba(255,255,255,.05), transparent 30%, rgba(255,255,255,.02));
  }

  canvas{
    width:100%;
    height:100%;
    display:block;
  }

  /* scanlines */
  .frame::before{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(255,255,255,.014) 4px
    );
    opacity:.35;
    pointer-events:none;
  }
  /* vignette */
  .frame::after{
    content:"";
    position:absolute; inset:-2px;
    background: radial-gradient(closest-side at 50% 50%, transparent 58%, rgba(0,0,0,.55) 100%);
    pointer-events:none;
  }

  .corner{
    position:absolute;
    z-index:3;
    font-size:12px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:rgba(255,255,255,.65);
    user-select:none;
  }
  .tl{ top:14px; left:16px; }
  .br{ bottom:14px; right:16px; letter-spacing:.10em; text-transform:none; }

  .controls{
    display:grid;
    gap:10px;
    padding:12px;
    border-radius:16px;
    border:1px solid var(--line);
    background: var(--panel);
    backdrop-filter: blur(10px);
  }

  .row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:space-between;
  }

  .left, .right{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }

  label{
    font-size:13px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:8px;
  }

  input[type="range"]{ width:180px; }

  .btn{
    border:1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.08);
    color:rgba(255,255,255,.86);
    padding:10px 12px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    letter-spacing:.02em;
  }
  .btn:active{ transform: translateY(1px); }

  .file{
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .file input{ display:none; }

  textarea{
    width:100%;
    min-height:84px;
    resize:vertical;
    padding:10px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.22);
    color:rgba(255,255,255,.82);
    outline:none;
    font-size:13px;
    line-height:1.35;
  }

  .hint{
    font-size:12px;
    color:rgba(255,255,255,.60);
  }

  .status{
    font-size:12px;
    color:rgba(255,255,255,.65);
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="frame">
    <div class="corner tl">Word Portrait</div>
    <div class="corner br">Tasnim Maria • Reyad ✨</div>
    <canvas id="cv"></canvas>
  </div>

  <div class="controls">
    <div class="row">
      <div class="left">
        <label class="file btn">
          Upload photo
          <input id="file" type="file" accept="image/*" />
        </label>

        <label>
          <input id="cropRight" type="checkbox" checked />
          Use right half (if collage)
        </label>
      </div>

      <div class="right">
        <button class="btn" id="renderBtn">Render</button>
        <button class="btn" id="downloadBtn">Download PNG</button>
      </div>
    </div>

    <div class="row">
      <label>
        Detail (more words)
        <input id="detail" type="range" min="6" max="12" value="8" />
        <span id="detailVal">8</span>
      </label>

      <label>
        Contrast
        <input id="contrast" type="range" min="1.0" max="2.4" step="0.1" value="1.6" />
        <span id="contrastVal">1.6</span>
      </label>

      <label>
        Skip light areas
        <input id="skip" type="range" min="0.00" max="0.12" step="0.01" value="0.04" />
        <span id="skipVal">0.04</span>
      </label>

      <div class="status" id="status">Upload a photo to begin 🙂</div>
    </div>

    <textarea id="words">
Tasnim Maria, Tasnim, Maria, Reyad,
adorable, cute, sweetie, dreamy, beautiful, graceful, lovely, charming,
gentle, kind, smile, sunshine, glow, precious, angel, heart, always
    </textarea>

    <div class="hint">
      Tip: If your laptop still gets loud 😅, raise <b>Detail</b> to 10–12 (fewer words). For more detail, drop it to 6–7.
    </div>
  </div>
</div>

<script>
(() => {
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d", { alpha: false });

  const file = document.getElementById("file");
  const cropRight = document.getElementById("cropRight");
  const detail = document.getElementById("detail");
  const contrast = document.getElementById("contrast");
  const skip = document.getElementById("skip");
  const wordsBox = document.getElementById("words");
  const statusEl = document.getElementById("status");

  const detailVal = document.getElementById("detailVal");
  const contrastVal = document.getElementById("contrastVal");
  const skipVal = document.getElementById("skipVal");

  const renderBtn = document.getElementById("renderBtn");
  const downloadBtn = document.getElementById("downloadBtn");

  let img = null;

  // fast deterministic random (so it looks consistent)
  let seed = 2463534242;
  function rnd(){
    seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
    return (seed >>> 0) / 4294967295;
  }
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const smoothstep = (a,b,x)=>{
    x = clamp((x-a)/(b-a), 0, 1);
    return x*x*(3-2*x);
  };

  function parseWords(){
    return wordsBox.value
      .split(/[\n,]+/g)
      .map(s => s.trim())
      .filter(Boolean);
  }

  function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    const box = cv.getBoundingClientRect();
    const size = Math.floor(Math.min(box.width, box.height));
    cv.width = Math.floor(size * dpr);
    cv.height = Math.floor(size * dpr);
    cv.style.width = size + "px";
    cv.style.height = size + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return size;
  }

  function getSourceRect(image){
    // Start with full image
    let sx = 0, sy = 0, sw = image.width, sh = image.height;

    // If collage, crop right half
    if (cropRight.checked){
      sx = Math.floor(image.width * 0.5);
      sw = Math.floor(image.width * 0.5);
    }

    // Center-crop to square (so portrait fits canvas nicely)
    const side = Math.min(sw, sh);
    sx = Math.floor(sx + (sw - side) / 2);
    sy = Math.floor(sy + (sh - side) / 2);
    sw = sh = side;

    return { sx, sy, sw, sh };
  }

  function drawBackground(size){
    ctx.save();
    ctx.fillStyle = "#070812";
    ctx.fillRect(0,0,size,size);

    // soft glow
    const g = ctx.createRadialGradient(size*0.5, size*0.35, size*0.05, size*0.5, size*0.55, size*0.70);
    g.addColorStop(0, "rgba(255,255,255,0.06)");
    g.addColorStop(1, "rgba(255,255,255,0.00)");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,size,size);
    ctx.restore();
  }

  function render(){
    if(!img){
      statusEl.textContent = "Upload a photo first 🙂";
      return;
    }

    // reset seed so each render looks stable
    seed = 2463534242;

    const size = resizeCanvas();
    drawBackground(size);

    const step = Number(detail.value);          // smaller step => more words
    const gamma = Number(contrast.value);       // contrast shaping
    const minA = Number(skip.value);            // skip light areas threshold
    detailVal.textContent = step;
    contrastVal.textContent = gamma.toFixed(1);
    skipVal.textContent = minA.toFixed(2);

    const cols = Math.floor(size / step);
    const rows = Math.floor(size / step);

    // Offscreen sample canvas = tiny brightness map (FAST)
    const off = document.createElement("canvas");
    off.width = cols;
    off.height = rows;
    const ox = off.getContext("2d", { willReadFrequently: true });

    const {sx,sy,sw,sh} = getSourceRect(img);
    ox.drawImage(img, sx, sy, sw, sh, 0, 0, cols, rows);

    const data = ox.getImageData(0,0,cols,rows).data;

    const words = parseWords();
    if(!words.length){
      statusEl.textContent = "Please add some words 🙂";
      return;
    }

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // Monospace keeps it sketchy and consistent
    const fontSize = Math.max(6, Math.floor(step * 0.95));
    ctx.font = `${fontSize}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
    ctx.fillStyle = "rgba(255,255,255,1)";

    // Focus mask (reduces busy background; keeps portrait as main subject)
    function focusMask(u,v){
      const dx = u - 0.52;
      const dy = v - 0.52;
      const r = Math.hypot(dx,dy);
      // 1 in center, fades toward edges
      return 1 - smoothstep(0.42, 0.78, r);
    }

    let r = 0;
    let wordIndex = 0;

    statusEl.textContent = "Rendering… 0%";

    function drawChunk(){
      const t0 = performance.now();

      while(r < rows && (performance.now() - t0) < 12){
        const v = (r + 0.5) / rows;

        for(let c=0; c<cols; c++){
          const u = (c + 0.5) / cols;
          const i = (r*cols + c) * 4;

          const R = data[i], G = data[i+1], B = data[i+2];

          // luminance (perceptual)
          const lum = (0.2126*R + 0.7152*G + 0.0722*B) / 255;

          // darkness => more ink
          let a = 1 - lum;

          // shape contrast
          a = Math.pow(a, gamma);

          // focus portrait
          a *= (0.35 + 0.65 * focusMask(u,v));

          // skip very light areas (big perf win)
          if(a < minA) continue;

          // clamp alpha
          a = clamp(a, 0, 0.95);

          // small deterministic jitter so it feels organic
          const jx = (rnd() - 0.5) * step * 0.18;
          const jy = (rnd() - 0.5) * step * 0.18;

          ctx.globalAlpha = a;

          // word choice (weighted by repeating names in your textarea if you want)
          const w = words[wordIndex++ % words.length];

          const x = c*step + step*0.5 + jx;
          const y = r*step + step*0.5 + jy;

          ctx.fillText(w, x, y);
        }

        r++;
      }

      const pct = Math.floor((r/rows)*100);
      statusEl.textContent = `Rendering… ${pct}%`;

      if(r < rows){
        requestAnimationFrame(drawChunk);
      }else{
        ctx.globalAlpha = 1;
        ctx.restore();
        statusEl.textContent = "Done ✨ (Download PNG when you like)";
      }
    }

    requestAnimationFrame(drawChunk);
  }

  file.addEventListener("change", (e) => {
    const f = e.target.files?.[0];
    if(!f) return;
    const url = URL.createObjectURL(f);
    const im = new Image();
    im.onload = () => {
      img = im;
      URL.revokeObjectURL(url);
      statusEl.textContent = "Photo loaded ✅ Now press Render 🙂";
      render();
    };
    im.src = url;
  });

  renderBtn.addEventListener("click", render);

  // live update labels
  [detail, contrast, skip].forEach(inp => inp.addEventListener("input", () => {
    detailVal.textContent = detail.value;
    contrastVal.textContent = Number(contrast.value).toFixed(1);
    skipVal.textContent = Number(skip.value).toFixed(2);
  }));

  // Download
  downloadBtn.addEventListener("click", () => {
    const a = document.createElement("a");
    a.download = "TasnimMaria_WordPortrait.png";
    a.href = cv.toDataURL("image/png");
    a.click();
  });

  // Initial paint
  resizeCanvas();
  drawBackground(Math.floor(cv.getBoundingClientRect().width));
})();
</script>

</body>
</html>
